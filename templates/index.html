<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 28px;
      color: #fff;
    }

    label.field-label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="url"] {
      width: 100%;
      padding: 12px 14px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e8e8e8;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 24px;
    }

    input[type="url"]:focus {
      border-color: #555;
    }

    input[type="url"]::placeholder {
      color: #444;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 14px;
      color: #ccc;
      transition: background 0.1s, border-color 0.1s;
    }

    .radio-label:hover {
      background: #222;
    }

    .radio-label input[type="radio"] {
      accent-color: #60a5fa;
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    .radio-label:has(input:checked) {
      background: #1e2d42;
      border-color: #2d5a8e;
      color: #fff;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 28px;
      padding: 13px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover {
      background: #1d4ed8;
    }

    button[type="submit"]:active {
      background: #1e40af;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Downloader</h1>
    <form method="POST" action="/download">

      <label class="field-label">Посилання</label>
      <input type="url" name="url" placeholder="https://youtube.com/watch?v=..." required>

      <div class="section">
        <div class="section-title">YouTube</div>
        <div class="options">
          {% for key, label in yt_formats %}
          <label class="radio-label">
            <input type="radio" name="format" value="{{ key }}" {% if loop.first %}checked{% endif %}>
            {{ label }}
          </label>
          {% endfor %}
        </div>
      </div>

      <div class="section">
        <div class="section-title">SoundCloud</div>
        <div class="options">
          {% for key, label in sc_formats %}
          <label class="radio-label">
            <input type="radio" name="format" value="{{ key }}">
            {{ label }}
          </label>
          {% endfor %}
        </div>
      </div>

      <button type="submit">Завантажити</button>
    </form>
  </div>
</body>
</html>
