<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Courier New", monospace;
      background: #f5f0eb;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 21px;
      font-weight: bold;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #ff9966;
    }

    input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      background: #fff;
      border: 2px solid #111;
      color: #111;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      margin-bottom: 20px;
    }

    input[type="url"]:focus {
      border-color: #ff9966;
    }

    input[type="url"]::placeholder {
      color: #aaa;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 8px;
    }

    .section {
      margin-bottom: 16px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 14px;
      color: #333;
    }

    .radio-label:hover {
      background: #ede8e3;
    }

    .radio-label input[type="radio"] {
      accent-color: #ff9966;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .radio-label:has(input:checked) {
      border-color: #ff9966;
      background: #fff5f0;
      color: #111;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: #ff9966;
      color: #111;
      font-family: inherit;
      font-size: 15px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: 2px solid #111;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background: #ff8855;
    }

    button[type="submit"]:active {
      background: #ff7744;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Downloader</h1>
    <form method="POST" action="/download">

      <input type="url" name="url" placeholder="https://youtube.com/watch?v=..." required>

      <div class="section">
        <div class="section-title">YouTube</div>
        <div class="options">
          {% for key, label in yt_formats %}
          <label class="radio-label">
            <input type="radio" name="format" value="{{ key }}" {% if loop.first %}checked{% endif %}>
            {{ label }}
          </label>
          {% endfor %}
        </div>
      </div>

      <div class="section">
        <div class="section-title">SoundCloud</div>
        <div class="options">
          {% for key, label in sc_formats %}
          <label class="radio-label">
            <input type="radio" name="format" value="{{ key }}">
            {{ label }}
          </label>
          {% endfor %}
        </div>
      </div>

      <button type="submit">Завантажити</button>
    </form>
  </div>
</body>
</html>
